---
- name: Setup Radiko development environment.
  hosts: all

  vars:
    radiko_project_dir: "{{ ansible_env.HOME }}/radiko"
    plane_install_dir: "{{ radiko_project_dir }}/plane"
    plane_port: 4680
    plane_https_port: 4443
    plane_domain: "{{ ansible_hostname }}"
    plane_workspace_slug: "radiko"
    plane_api_key: "{{ lookup('file', playbook_dir + '/.env') | regex_search('PLANE_API_KEY=(.+)', '\\1') | first }}"

  tasks:
    - import_tasks: tasks/radiko/clone.yml
      tags: ['clone']

    - import_tasks: tasks/radiko/plane.yml
      tags: ['plane']

    - import_tasks: tasks/radiko/plane-mcp.yml
      tags: ['plane-mcp']
