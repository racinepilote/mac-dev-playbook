---
- name: Remove unwanted Dock items (skip if absent)
  shell: dockutil --find '{{ item }}' && dockutil --remove '{{ item }}'
  register: dock_remove
  changed_when: "'was removed' in dock_remove.stdout"
  failed_when: false
  with_items: "{{ dockitems_to_remove }}"

- name: Ensure dock items are present at correct position
  shell: >
    dockutil --find '{{ item.name }}'
    && dockutil --move '{{ item.name }}' --position {{ item.pos }}
    || dockutil --add '{{ item.path }}' --position {{ item.pos }}
  failed_when: false
  with_items: "{{ dockitems_to_persist }}"